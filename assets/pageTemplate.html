<!-- Copy and paste this into a new html file, name it whatever you want.html, then create a button that links to it in index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLACEHOLDER</title> <!-- Write what you want to appear on the browser tab here -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>


        <div class="container-main">
            <a class="return-button" href="index.html">🢦</a>
            <h2>PLACEHOLDER</h2> <!-- Write what you want the title of the page (header) to be here -->
            <div class="wrapper">
                <div class="wrapper-image">
                        <!-- Here is where you can add an image -->
                        <!-- Place all image files in assets/Images/ -->
                        <!-- Try to keep images small, as they are shrunk down to the container anyway, and large ones may load slowly -->
                        <img style="text-align: center;" src="assets/Images/IMAGE FILE NAME" alt="ALTERNATIVE GIVEN RENDERING ISSUES (text)">
                </div>
                <div class="wrapper-text">
                    <p>PLACEHOLDER</p> <!-- write text <p> HERE </p>-->
                    <p>PLACEHOLDER</p> <!-- add more to start on a new line -->
                    <!-- Here is a separator for you, cut and paste wherever you want -->
                    <p>  ❀・・・❀・・・❀・・・❀・・・❀・・・❀   </p>

                    <!-- Here are some buttons, the one with _target="blank" will open the link in a new tab! -->
                    <p><a href="LINK GOES HERE">TEXT THAT APPEARS ON THE BUTTON</p>
                    <p><a href="LINK GOES HERE" target="_blank">TEXT THAT APPEARS ON THE BUTTON</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>꧁ღ⊱♥ &copy; 2026 Andrea Rueda      ♥⊱ღ꧂             </p>
    </footer>

</body>

</html>
